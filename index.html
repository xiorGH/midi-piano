<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MIDI Piano</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="piano">
      <div id="piano-header">
        <p id="message">Placeholdery Thing</p>
        <div id="ui">
        <div id="fs" onclick="screenFull()"><p id="tag"><span id="check">•</span>FULLSCREEN</p></div>
        <div id="list">Lista de Soundfonts<br><input list="sound" id="search"><button id="changer">♪</button></div>
        <datalist id="sound"></datalist>
        <div id="eight"><button onclick="changeOctave(false)">–</button><span id="counter">4/5</span><button onclick="changeOctave(true)">+</button></div>
        </div>
      </div>
      <div id="keys">
        <div class="key white" id="q">q
         <div class="key black" id="1">1</div>
        </div>
        <div class="key white" id="a">a
         <div class="key black" id="2">2</div>
        </div>
        <div class="key white" id="w">w</div>
        <div class="key white" id="s">s
         <div class="key black" id="3">3</div>
        </div>
        <div class="key white" id="e">e
         <div class="key black" id="4">4</div>
        </div>
        <div class="key white" id="d">d
         <div class="key black" id="5">5</div>
        </div>
        <div class="key white" id="r">r</div>
        <div class="key white" id="y">y
         <div class="key black" id="6">6</div>
        </div>
        <div class="key white" id="h">h
         <div class="key black" id="7">7</div>
        </div>
        <div class="key white" id="u">u</div>
        <div class="key white" id="j">j
         <div class="key black" id="8">8</div>
        </div>
        <div class="key white" id="i">i
         <div class="key black" id="9">9</div>
        </div>
        <div class="key white" id="k">k
         <div class="key black" id="0">0</div>
        </div>
        <div class="key white" id="o">o</div>
        <div class="key white" id="l">l</div>
      </div>
    </div>
    <script src="https://unpkg.com/soundfont-player@0.12.0/dist/soundfont-player.js"></script>
    <script src="script.js"></script>
  </body>
</html>
